name: vdl
description: A new Flutter application.

publish_to: 'none'

version: 3.1.3+46

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.3

  persistent_bottom_nav_bar: ^6.2.1

  flutter_svg: ^2.0.9

  url_launcher: ^6.2.5

  flutter_card_swipper: ^0.4.0
  flutter_switch: ^0.3.2

  audioplayers: ^5.2.1

  audio_video_progress_bar: ^2.0.2
  flutter_bloc: ^8.1.3
  sendgrid_mailer: ^0.1.3
  fluttertoast: ^8.2.4
  shared_preferences: ^2.2.2
  timeago: ^3.4.0
  equatable: ^2.0.5
  email_validator: ^2.1.17
  get_it: ^7.6.7
  scrollable_positioned_list: ^0.3.8
  intl: ^0.18.1
  auto_size_text: ^3.0.0
  font_awesome_flutter: ^10.7.0
  html: ^0.15.4
  onesignal_flutter: ^5.1.5
  store_redirect: ^2.0.3
  update_available: ^3.0.0
  audio_service: ^0.18.13
  fluttericon: ^2.0.0
  webview_flutter: ^4.4.4
  just_audio: ^0.9.36
  share_plus: ^7.2.2
  audio_session: ^0.1.21

  just_audio_background: ^0.0.1-beta.11
  firebase_core: ^2.25.4
  firebase_analytics: ^10.8.9
  google_mobile_ads: ^5.1.0
  focus_detector: ^2.0.1

  flutter_inappwebview: ^6.1.5
  flutter_widget_from_html: ^0.16.0

  cached_network_image: ^3.3.0
  meta: any
  bloc: any
  http: any
dependency_overrides:
  sqflite: ^2.3.0
  video_player: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/Launcher/appIcon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/launcher/
    - assets/icons/
  fonts:
    - family: TheSans
      fonts:
        - asset: assets/fonts/TheSans-Plain.otf
        - asset: assets/fonts/TheSans-Bold.otf
          weight: 700
